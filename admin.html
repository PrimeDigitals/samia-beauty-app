<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - سامية بيوتي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #333; color: white; height: 100vh; padding: 20px; box-sizing: border-box; position: fixed; right: 0; overflow-y: auto; }
        .sidebar h2 { color: #d4af37; font-size: 20px; text-align: center; margin-bottom: 30px; }
        .menu-item { padding: 15px 10px; border-bottom: 1px solid #444; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { color: #d4af37; background: #222; }
        .content { margin-right: 250px; flex: 1; padding: 30px; }
        .header-actions { display: flex; gap: 15px; margin-bottom: 20px; }
        input[type="text"], input[type="tel"], input[type="number"], textarea { padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 8px 15px; background: #d4af37; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background: #eee; }
        .card-panel { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        label { font-weight: bold; color: #5a3e4a; display: block; margin-top: 10px; }
    </style>
</head>
<body onload="initializeAdmin()">

<div class="sidebar">
    <h2>سامية بيوتي</h2>
    <div class="menu-item" onclick="showSection('customers')">العميلات والنقاط</div>
    <div class="menu-item" onclick="showSection('settings')">إعدادات النظام</div>
</div>

<div class="content">
    <div id="customers-section">
        <h3>إدارة العميلات</h3>
        <input type="text" placeholder="البحث برقم الجوال..." id="searchInput" onkeyup="searchCustomer()">
        <table>
            <thead>
                <tr><th>الاسم</th><th>رقم الجوال</th><th>النقاط</th><th>الإجراءات</th></tr>
            </thead>
            <tbody id="customersTable"></tbody>
        </table>
    </div>

    <div id="settings-section" style="display:none;" class="card-panel">
        <h3>إعدادات النظام</h3>
        <div class="settings-grid">
            <div class="full-width"><label>رابط الشعار:</label><input type="text" id="setLogoUrl"></div>
            <div><label>قيمة النقطة:</label><input type="number" id="setPointValue"></div>
            <div><label>جوال التواصل:</label><input type="tel" id="setContactPhone"></div>
            <div class="full-width"><label>معلومات البطاقة:</label><textarea id="setCardInfo"></textarea></div>
            <div class="full-width"><button class="btn" onclick="saveSettings()">حفظ الإعدادات</button></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "ضع_مفتاح_API_الخاص_بك_هنا", 
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };

    let db;
    function initializeAdmin() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        loadCustomers();
    }

    function showSection(id) {
        document.getElementById('customers-section').style.display = id==='customers'?'block':'none';
        document.getElementById('settings-section').style.display = id==='settings'?'block':'none';
    }

    async function loadCustomers() {
        const table = document.getElementById('customersTable');
        table.innerHTML = 'جاري التحميل...';
        const snapshot = await db.collection("customers").get();
        table.innerHTML = '';
        snapshot.forEach(doc => {
            const c = doc.data();
            table.innerHTML += `<tr>
                <td>${c.name}</td><td>${c.phone}</td><td>${c.points}</td>
                <td><button class="btn" onclick="updatePoints('${doc.id}', ${c.points})">+ إضافة نقطة</button></td>
            </tr>`;
        });
    }

    async function updatePoints(id, current) {
        await db.collection("customers").doc(id).update({ points: current + 1 });
        loadCustomers();
    }

    async function saveSettings() {
        const settings = {
            logoUrl: document.getElementById('setLogoUrl').value,
            pointValue: document.getElementById('setPointValue').value,
            contactPhone: document.getElementById('setContactPhone').value,
            cardInfo: document.getElementById('setCardInfo').value
        };
        await db.collection("settings").doc("main").set(settings);
        alert("تم الحفظ!");
    }
</script>
</body>
</html>
