<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - سامية بيوتي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #333; color: white; height: 100vh; position: fixed; right: 0; padding: 20px; }
        .sidebar h2 { color: #d4af37; text-align: center; }
        .menu-item { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; }
        .menu-item:hover { background: #444; color: #d4af37; }
        .content { margin-right: 250px; flex: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; }
        .btn { padding: 8px 15px; background: #d4af37; color: white; border: none; border-radius: 5px; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body onload="initAdmin()">
<div class="sidebar">
    <h2>سامية بيوتي</h2>
    <div class="menu-item" onclick="showTab('cust')">إدارة العميلات</div>
    <div class="menu-item" onclick="showTab('notif')">إرسال إشعارات</div>
    <div class="menu-item" onclick="showTab('settings')">الإعدادات</div>
</div>

<div class="content">
    <div id="custTab">
        <div class="card">
            <h3>العميلات المسجلات (<span id="count">0</span>)</h3>
            <table>
                <thead><tr><th>الاسم</th><th>الجوال</th><th>النقاط</th><th>الإجراء</th></tr></thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div id="notifTab" style="display:none;">
        <div class="card">
            <h3>إرسال إشعار عام</h3>
            <input type="text" id="ntitle" placeholder="عنوان الإشعار">
            <textarea id="nbody" placeholder="نص الرسالة"></textarea>
            <button class="btn" onclick="alert('سيتم الإرسال لجميع الأجهزة المفعلة قريباً!')">إرسال الآن</button>
        </div>
    </div>

    <div id="settingsTab" style="display:none;">
        <div class="card">
            <h3>إعدادات المتجر</h3>
            <label>رابط اللوجو:</label><input type="text" id="sLogo">
            <label>ملاحظة النقاط:</label><input type="text" id="sNote">
            <button class="btn" onclick="saveSettings()">حفظ التغييرات</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function initAdmin() {
        // مراقبة العميلات لحظياً
        db.collection("customers").orderBy("createdAt", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('userTable');
            tbody.innerHTML = "";
            document.getElementById('count').innerText = snap.size;
            snap.forEach(doc => {
                const u = doc.data();
                tbody.innerHTML += `<tr>
                    <td>${u.name}</td>
                    <td>${u.phone}</td>
                    <td>${u.points}</td>
                    <td><button class="btn" onclick="addPoints('${doc.id}', ${u.points})">+ نقاط</button></td>
                </tr>`;
            });
        });
        loadSettings();
    }

    async function addPoints(id, current) {
        const p = prompt("كم عدد النقاط المراد إضافتها؟");
        if(p && !isNaN(p)) {
            await db.collection("customers").doc(id).update({ points: current + parseInt(p) });
        }
    }

    async function saveSettings() {
        await db.collection("settings").doc("main").set({
            logoUrl: document.getElementById('sLogo').value,
            pointNote: document.getElementById('sNote').value
        }, { merge: true });
        alert("تم الحفظ");
    }

    async function loadSettings() {
        const doc = await db.collection("settings").doc("main").get();
        if(doc.exists) {
            document.getElementById('sLogo').value = doc.data().logoUrl || "";
            document.getElementById('sNote').value = doc.data().pointNote || "";
        }
    }

    function showTab(t) {
        document.getElementById('custTab').style.display = t === 'cust' ? 'block' : 'none';
        document.getElementById('notifTab').style.display = t === 'notif' ? 'block' : 'none';
        document.getElementById('settingsTab').style.display = t === 'settings' ? 'block' : 'none';
    }
</script>
</body>
</html>
