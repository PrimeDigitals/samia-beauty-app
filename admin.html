<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الشاملة - سامية بيوتي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #333; color: white; height: 100vh; position: fixed; right: 0; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .sidebar h2 { color: #d4af37; text-align: center; margin-bottom: 30px; }
        .menu-item { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { color: #d4af37; background: #222; }
        .content { margin-right: 250px; flex: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px 15px; background: #d4af37; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; left: 15px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
    </style>
</head>
<body onload="initAdmin()">
<div class="sidebar">
    <h2>سامية بيوتي</h2>
    <div class="menu-item" onclick="showTab('customers')">العميلات والنقاط</div>
    <div class="menu-item" onclick="showTab('notif')">إرسال إشعارات</div>
    <div class="menu-item" onclick="showTab('settings')">إعدادات النظام</div>
</div>
<div class="content">
    <div class="card"><h3>إحصائيات</h3><p>عدد العميلات: <span id="custCount">0</span> | نقاط موزعة: <span id="ptsTotal">0</span></p></div>
    <div id="customersTab">
        <div class="card">
            <h3>قائمة العميلات</h3>
            <input type="text" id="search" placeholder="بحث بالاسم أو الجوال..." onkeyup="search()">
            <table><thead><tr><th>الاسم</th><th>الجوال</th><th>النقاط</th><th>الإجراءات</th></tr></thead><tbody id="userTable"></tbody></table>
        </div>
    </div>
    <div id="notifTab" style="display:none;" class="card">
        <h3>إرسال إشعار عام</h3>
        <input type="text" id="nTitle" placeholder="عنوان الإشعار"><textarea id="nBody" placeholder="نص الرسالة"></textarea>
        <button class="btn" onclick="alert('تم الإرسال!')">إرسال الآن</button>
    </div>
    <div id="settingsTab" style="display:none;" class="card">
        <h3>إعدادات البطاقة والـ Geofencing</h3>
        <button class="btn" onclick="saveSettings()" style="width:100%">حفظ أونلاين</button>
        <label>رابط اللوجو:</label><input type="text" id="sLogo"><label>ملاحظة النقاط:</label><input type="text" id="sNote">
        <label>Lat:</label><input type="text" id="sLat"><label>Lng:</label><input type="text" id="sLng">
        <label>ترحيب:</label><input type="text" id="sWelcome"><label>شروط:</label><textarea id="sTerms"></textarea>
        <label>واتساب:</label><input type="text" id="sWa"><label>تيك توك:</label><input type="text" id="sTk">
    </div>
</div>
<div id="histModal" class="modal">
    <div class="modal-content"><button class="close-btn" onclick="document.getElementById('histModal').style.display='none'">X</button><h3 id="hName">سجل النقاط</h3>
        <table><thead><tr><th>التاريخ</th><th>العملية</th><th>الرصيد</th></tr></thead><tbody id="hBody"></tbody></table></div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "primedigitals-1802f.firebaseapp.com", projectId: "primedigitals-1802f", storageBucket: "primedigitals-1802f.appspot.com", messagingSenderId: "774910246237", appId: "1:774910246237:web:866236b8a8b13d28913210" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function initAdmin() { loadUsers(); loadSettings(); }

    function loadUsers() {
        db.collection("customers").onSnapshot(snap => {
            const tbody = document.getElementById('userTable'); tbody.innerHTML = '';
            let total = 0; document.getElementById('custCount').innerText = snap.size;
            snap.forEach(doc => {
                const c = doc.data(); total += c.points;
                tbody.innerHTML += `<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.points}</td>
                    <td><button class="btn" onclick="addPoints('${doc.id}', ${c.points})">+ نقاط</button>
                    <button class="btn" style="background:#5a3e4a" onclick="viewHistory('${doc.id}')">السجل</button></td></tr>`;
            });
            document.getElementById('ptsTotal').innerText = total;
        });
    }

    async function addPoints(id, cur) {
        const p = prompt("النقاط لإضافتها:");
        if(p && !isNaN(p)) {
            const add = parseInt(p); const now = new Date().toLocaleString('ar-EG');
            await db.collection("customers").doc(id).update({ points: cur + add, history: firebase.firestore.FieldValue.arrayUnion({ date: now, action: `+${add}`, total: cur + add }) });
        }
    }

    async function viewHistory(id) {
        const doc = await db.collection("customers").doc(id).get(); const hist = doc.data().history || [];
        document.getElementById('hBody').innerHTML = hist.reverse().map(h => `<tr><td>${h.date}</td><td>${h.action}</td><td>${h.total}</td></tr>`).join('');
        document.getElementById('histModal').style.display = 'flex';
    }

    async function saveSettings() {
        const s = { logoUrl: document.getElementById('sLogo').value, pointNote: document.getElementById('sNote').value, lat: document.getElementById('sLat').value, lng: document.getElementById('sLng').value, welcomeNotif: document.getElementById('sWelcome').value, terms: document.getElementById('sTerms').value, whatsapp: document.getElementById('sWa').value, tiktok: document.getElementById('sTk').value };
        await db.collection("settings").doc("main").set(s, { merge: true }); alert("تم الحفظ!");
    }

    async function loadSettings() {
        const doc = await db.collection("settings").doc("main").get();
        if(doc.exists) {
            const s = doc.data(); document.getElementById('sLogo').value = s.logoUrl || ""; document.getElementById('sNote').value = s.pointNote || "";
            document.getElementById('sLat').value = s.lat || ""; document.getElementById('sLng').value = s.lng || "";
            document.getElementById('sWelcome').value = s.welcomeNotif || ""; document.getElementById('sTerms').value = s.terms || "";
        }
    }

    function showTab(t) { document.getElementById('customersTab').style.display = t === 'customers' ? 'block' : 'none'; document.getElementById('notifTab').style.display = t === 'notif' ? 'block' : 'none'; document.getElementById('settingsTab').style.display = t === 'settings' ? 'block' : 'none'; }
    function search() { let q = document.getElementById('search').value.toLowerCase(); let rows = document.querySelectorAll('#userTable tr'); rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none'); }
</script>
</body>
</html>
