<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة سامية بيوتي - أونلاين</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #333; color: white; height: 100vh; padding: 20px; position: fixed; right: 0; }
        .sidebar h2 { color: #d4af37; text-align: center; }
        .menu-item { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; }
        .content { margin-right: 250px; flex: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        .btn { padding: 10px 20px; background: #d4af37; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="initAdmin()">

<div class="sidebar">
    <h2>سامية بيوتي</h2>
    <div class="menu-item" onclick="showTab('customers')">قائمة العميلات</div>
    <div class="menu-item" onclick="showTab('settings')">إعدادات البطاقة</div>
</div>

<div class="content">
    <div id="customers-tab" class="card">
        <h3>البحث عن عميلة</h3>
        <input type="text" id="searchBox" placeholder="ابحث بالاسم أو رقم الجوال..." onkeyup="filterTable()">
        <table>
            <thead><tr><th>الاسم</th><th>الجوال</th><th>النقاط</th><th>إجراءات</th></tr></thead>
            <tbody id="customerTableBody"></tbody>
        </table>
    </div>

    <div id="settings-tab" class="card" style="display:none;">
        <h3>تعديل محتوى البطاقة</h3>
        <label>رابط الشعار:</label><input type="text" id="s_logo">
        <label>رقم التواصل:</label><input type="text" id="s_phone">
        <label>واتساب:</label><input type="text" id="s_whatsapp">
        <label>سناب شات:</label><input type="text" id="s_snap">
        <label>شروط الاستخدام:</label><textarea id="s_terms"></textarea>
        <button class="btn" onclick="saveSettings()">حفظ الإعدادات أونلاين</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", // ضع مفتاحك هنا
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function initAdmin() {
        fetchCustomers();
        fetchSettings();
    }

    function fetchCustomers() {
        db.collection("customers").onSnapshot(snap => {
            const tbody = document.getElementById('customerTableBody');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                tbody.innerHTML += `<tr>
                    <td>${c.name}</td><td>${c.phone}</td><td>${c.points}</td>
                    <td><button class="btn" onclick="updatePoints('${doc.id}', ${c.points})">تعديل النقاط</button></td>
                </tr>`;
            });
        });
    }

    async function updatePoints(id, current) {
        const val = prompt("أدخل النقاط الجديدة (أو استخدم + و - مثل +10):", current);
        if(val === null) return;
        
        let finalPoints = parseInt(val);
        if(val.startsWith('+')) finalPoints = current + parseInt(val.substring(1));
        if(val.startsWith('-')) finalPoints = current - parseInt(val.substring(1));

        await db.collection("customers").doc(id).update({ points: finalPoints });
    }

    async function saveSettings() {
        await db.collection("settings").doc("main").set({
            logoUrl: document.getElementById('s_logo').value,
            contactPhone: document.getElementById('s_phone').value,
            whatsapp: document.getElementById('s_whatsapp').value,
            snap: document.getElementById('s_snap').value,
            terms: document.getElementById('s_terms').value
        }, { merge: true });
        alert("تم التحديث بنجاح!");
    }

    function showTab(tab) {
        document.getElementById('customers-tab').style.display = tab === 'customers' ? 'block' : 'none';
        document.getElementById('settings-tab').style.display = tab === 'settings' ? 'block' : 'none';
    }

    function filterTable() {
        let q = document.getElementById('searchBox').value.toLowerCase();
        let rows = document.querySelectorAll('#customerTableBody tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
    }

    async function fetchSettings() {
        const doc = await db.collection("settings").doc("main").get();
        if(doc.exists) {
            const s = doc.data();
            document.getElementById('s_logo').value = s.logoUrl || '';
            document.getElementById('s_phone').value = s.contactPhone || '';
            document.getElementById('s_whatsapp').value = s.whatsapp || '';
            document.getElementById('s_snap').value = s.snap || '';
            document.getElementById('s_terms').value = s.terms || '';
        }
    }
</script>
</body>
</html>
