<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامية بيوتي - بطاقة الولاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fcf1f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .logo { width: 120px; max-height: 120px; margin-bottom: 15px; object-fit: contain; }
        h2 { color: #5a3e4a; margin-bottom: 5px; }
        .points-info { background-color: #fdf5e6; color: #d4af37; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 20px; border: 1px dashed #d4af37; }
        .input-group { margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background-color: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        details { text-align: right; margin-top: 15px; background: #f9f9f9; border-radius: 8px; padding: 10px; border: 1px solid #eee; }
        summary { cursor: pointer; font-weight: bold; color: #5a3e4a; outline: none; }
        .details-content { font-size: 13px; color: #666; margin-top: 10px; line-height: 1.6; white-space: pre-line; }
        /* QR & Home Button */
        #qrcode { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: white; }
        .btn-home { background-color: #000; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .points-large { font-size: 32px; color: #d4af37; font-weight: bold; margin: 10px 0; }
        .social-icons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .social-icons a { color: #5a3e4a; font-size: 24px; text-decoration: none; }
        .contact-phone { margin-top: 15px; font-size: 14px; color: #5a3e4a; font-weight: bold; direction: ltr; }
    </style>
</head>
<body onload="initApp()">
<div class="container">
    <img src="https://via.placeholder.com/120?text=Samia+Beauty" alt="Logo" class="logo" id="salonLogo">
    <h2 id="mainTitle">برنامج مكافآت سامية بيوتي</h2>
    <div class="points-info" id="pointsNote">جاري التحميل...</div>

    <div id="registerForm">
        <div class="input-group"><input type="text" id="custName" placeholder="الاسم بالكامل"></div>
        <div class="input-group"><input type="tel" id="custPhone" placeholder="رقم الجوال"></div>
        <button class="btn-submit" onclick="handleAuth()">إصدار البطاقة</button>
    </div>

    <div id="cardDisplay" style="display:none;">
        <div class="points-large" id="userPoints">0 نقطة</div>
        <div id="qrcode"></div>
        <button class="btn-home" onclick="showAddInstructions()">
            <i class="fa-solid fa-mobile-screen"></i> إضافة البطاقة للشاشة الرئيسية
        </button>
    </div>

    <details><summary>معلومات البطاقة</summary><div class="details-content" id="infoBox"></div></details>
    <details><summary>شروط الاستخدام</summary><div class="details-content" id="termsBox"></div></details>

    <div class="social-icons">
        <a href="#" id="linkWhatsapp"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" id="linkInsta"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" id="linkSnap"><i class="fa-brands fa-snapchat"></i></a>
    </div>
    <div class="contact-phone" id="salonPhone"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", // ضع مفتاحك هنا
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function initApp() { loadSettings(); }

    async function loadSettings() {
        const doc = await db.collection("settings").doc("main").get();
        if(doc.exists) {
            const s = doc.data();
            if(s.logoUrl) document.getElementById('salonLogo').src = s.logoUrl;
            document.getElementById('pointsNote').innerText = s.pointNote || "كل 1 نقطة = 1 ريال";
            document.getElementById('infoBox').innerText = s.cardInfo || "";
            document.getElementById('termsBox').innerText = s.terms || "";
            document.getElementById('salonPhone').innerText = s.phone || "";
            document.getElementById('linkWhatsapp').href = s.whatsapp || "#";
            document.getElementById('linkInsta').href = s.insta || "#";
            document.getElementById('linkSnap').href = s.snap || "#";
        }
    }

    async function handleAuth() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        if(!name || !phone) return alert("يرجى إكمال البيانات");

        const snap = await db.collection("customers").where("phone", "==", phone).get();
        if(!snap.empty) {
            setupUserCard(snap.docs[0].id, snap.docs[0].data());
        } else {
            const res = await db.collection("customers").add({ name, phone, points: 0, history: [] });
            setupUserCard(res.id, { name, phone, points: 0 });
        }
    }

    function setupUserCard(id, data) {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('cardDisplay').style.display = 'block';
        document.getElementById('mainTitle').innerText = "بطاقتك يا " + data.name;
        
        new QRCode(document.getElementById("qrcode"), { text: data.phone, width: 160, height: 160 });
        
        db.collection("customers").doc(id).onSnapshot(doc => {
            document.getElementById('userPoints').innerText = doc.data().points + " نقطة";
        });
    }

    function showAddInstructions() {
        alert("لحفظ البطاقة مجاناً:\n1. اضغطي على زر المشاركة (آيفون) أو الـ 3 نقاط (أندرويد).\n2. اختاري 'إضافة إلى الشاشة الرئيسية'.");
    }
</script>
</body>
</html>
