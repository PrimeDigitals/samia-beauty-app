<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامية بيوتي - بطاقة الولاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fcf1f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .logo { width: 120px; max-height: 120px; margin-bottom: 15px; object-fit: contain; }
        h2 { color: #5a3e4a; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 15px; }
        .points-info { background-color: #fdf5e6; color: #d4af37; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 20px; border: 1px dashed #d4af37; }
        .input-group { margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background-color: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        details { text-align: right; margin-top: 15px; background: #f9f9f9; border-radius: 8px; padding: 10px; border: 1px solid #eee; }
        summary { cursor: pointer; font-weight: bold; color: #5a3e4a; outline: none; }
        .details-content { font-size: 13px; color: #666; margin-top: 10px; line-height: 1.6; white-space: pre-line; }
        .social-icons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .social-icons a { color: #5a3e4a; font-size: 24px; text-decoration: none; transition: 0.3s; }
        .social-icons a:hover { color: #d4af37; }
        .contact-phone { margin-top: 15px; font-size: 14px; color: #5a3e4a; font-weight: bold; direction: ltr; }
        .wallet-buttons { display: none; margin-top: 20px; gap: 10px; flex-direction: column; }
        .btn-wallet { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; color: white; }
        .apple-wallet { background-color: #000; }
        .google-wallet { background-color: #333; }
        .welcome-back { color: #28a745; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body onload="initializeFirebase()">

<div class="container">
    <img src="https://via.placeholder.com/120?text=Samia+Beauty" alt="Logo" class="logo" id="salonLogo">
    <h2>انضمي لبرنامج المكافآت</h2>
    <div class="points-info" id="pointsDisplay">كل 1 نقطة = 1 ريال تستخدمينها في خدمات سامية بيوتي</div>
    <div id="welcomeBackMsg" class="welcome-back">أهلاً برجوعك مرة تانية، بطاقتك جاهزة!</div>

    <div id="registerForm">
        <div class="input-group"><input type="text" id="customerName" placeholder="الاسم الأول والأخير" required></div>
        <div class="input-group"><input type="tel" id="customerPhone" placeholder="رقم الجوال (مثال: 05xxxxxxxxx)" required></div>
        <button class="btn-submit" onclick="registerCustomer()">إصدار بطاقة الولاء</button>
    </div>

    <div class="wallet-buttons" id="walletSection">
        <p id="userStatus"></p>
        <button class="btn-wallet apple-wallet"><i class="fa-brands fa-apple"></i> Add to Apple Wallet</button>
        <button class="btn-wallet google-wallet"><i class="fa-brands fa-google"></i> Add to Google Wallet</button>
    </div>

    <details><summary>معلومات البطاقة</summary><div class="details-content" id="cardInfoDisplay">يتم تحميل المعلومات...</div></details>
    <details><summary>شروط الاستخدام</summary><div class="details-content" id="termsDisplay">يتم تحميل الشروط...</div></details>

    <div class="social-icons">
        <a href="#" id="linkWhatsapp" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" id="linkInsta" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" id="linkTiktok" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" id="linkSnap" target="_blank"><i class="fa-brands fa-snapchat"></i></a>
        <a href="#" id="linkWeb" target="_blank"><i class="fa-solid fa-globe"></i></a>
    </div>
    <div class="contact-phone" id="phoneDisplay">0500000000</div>
</div>

<script>
    // إعدادات فايربيز الخاصة بمشروعك
    const firebaseConfig = {
        apiKey: "ضع_مفتاح_API_الخاص_بك_هنا", 
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };

    let db;
    function initializeFirebase() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        loadSettings();
    }

    async function loadSettings() {
        const doc = await db.collection("settings").doc("main").get();
        if (doc.exists) {
            const s = doc.data();
            if(s.logoUrl) document.getElementById('salonLogo').src = s.logoUrl;
            if(s.pointValue) document.getElementById('pointsDisplay').innerText = `كل 1 نقطة = ${s.pointValue} ريال تستخدمينها في خدماتنا`;
            if(s.cardInfo) document.getElementById('cardInfoDisplay').innerText = s.cardInfo;
            if(s.terms) document.getElementById('termsDisplay').innerText = s.terms;
            if(s.contactPhone) document.getElementById('phoneDisplay').innerText = s.contactPhone;
        }
    }

    async function registerCustomer() {
        const name = document.getElementById('customerName').value;
        const phone = document.getElementById('customerPhone').value;
        if(!name || !phone) { alert("يرجى إدخال البيانات"); return; }

        const snapshot = await db.collection("customers").where("phone", "==", phone).get();
        
        if(!snapshot.empty) {
            const user = snapshot.docs[0].data();
            document.getElementById('welcomeBackMsg').style.display = 'block';
            document.getElementById('userStatus').innerText = `رصيد نقاطك الحالي: ${user.points} نقطة`;
        } else {
            await db.collection("customers").add({
                name: name,
                phone: phone,
                points: 0,
                history: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('userStatus').innerText = `تم تسجيلك بنجاح! رصيدك الحالي: 0 نقطة`;
        }
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('walletSection').style.display = 'flex';
    }
</script>
</body>
</html>
