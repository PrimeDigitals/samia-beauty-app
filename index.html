<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامية بيوتي - بطاقة الولاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fcf1f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .logo { width: 120px; max-height: 120px; margin-bottom: 15px; object-fit: contain; }
        h2 { color: #5a3e4a; margin-bottom: 5px; }
        .points-info { background-color: #fdf5e6; color: #d4af37; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 1px dashed #d4af37; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background-color: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        #cardSection { display: none; margin-top: 20px; }
        .points-large { font-size: 32px; color: #d4af37; font-weight: bold; margin-bottom: 10px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        .btn-install { background-color: #000; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body onload="initApp()">
<div class="container">
    <img src="https://via.placeholder.com/120?text=Samia+Beauty" alt="Logo" class="logo" id="salonLogo">
    <h2 id="titleHeader">نادي ولاء سامية بيوتي</h2>
    <div class="points-info" id="pointsNote">كل 1 نقطة = 1 ريال مكافأة</div>
    
    <div id="registerForm">
        <input type="text" id="custName" placeholder="الاسم الكريم">
        <input type="tel" id="custPhone" placeholder="رقم الجوال">
        <button class="btn-submit" onclick="processAuth()">إصدار بطاقتي</button>
    </div>

    <div id="cardSection">
        <div class="points-large" id="displayPoints">0 نقطة</div>
        <div id="qrcode"></div>
        <button class="btn-install" onclick="promptInstall()"><i class="fa-solid fa-mobile-screen"></i> إضافة للشاشة الرئيسية</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", // ضع مفتاح الـ API الخاص بك هنا
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const messaging = firebase.messaging();

    async function initApp() {
        // تسجيل الـ Service Worker لاستقبال الإشعارات
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('firebase-messaging-sw.js');
        }
        // تحميل الإعدادات (اللوجو والملاحظات)
        const doc = await db.collection("settings").doc("main").get();
        if(doc.exists) {
            const s = doc.data();
            if(s.logoUrl) document.getElementById('salonLogo').src = s.logoUrl;
            document.getElementById('pointsNote').innerText = s.pointNote || "";
        }
    }

    async function processAuth() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        if(!name || !phone) return alert("يرجى إدخال البيانات");

        const snapshot = await db.collection("customers").where("phone", "==", phone).get();
        let docId;
        if(!snapshot.empty) {
            docId = snapshot.docs[0].id;
            renderCard(docId, snapshot.docs[0].data());
        } else {
            const res = await db.collection("customers").add({
                name, phone, points: 0, history: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            docId = res.id;
            renderCard(docId, { name, phone, points: 0 });
        }
        requestNotifPermission(docId);
    }

    function renderCard(id, data) {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('cardSection').style.display = 'block';
        document.getElementById('titleHeader').innerText = "أهلاً بكِ، " + data.name;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: data.phone, width: 160, height: 160 });

        db.collection("customers").doc(id).onSnapshot(doc => {
            if(doc.exists) document.getElementById('displayPoints').innerText = doc.data().points + " نقطة";
        });
    }

    function requestNotifPermission(docId) {
        Notification.requestPermission().then(async (permission) => {
            if (permission === 'granted') {
                const token = await messaging.getToken({ vapidKey: 'BA-hdtd_zsaR2lPhSZWKpuolJhGVl4q5rRkMuAi7h4gd4ol1Yu_x6nAl1K5Hjtr3y_yGIvHmka6dsQ4H8uFsulo' });
                if (token) await db.collection("customers").doc(docId).update({ fcmToken: token });
            }
        });
    }

    function promptInstall() {
        alert("لحفظ البطاقة:\nاضغطي على 'مشاركة' ثم 'إضافة للشاشة الرئيسية'.");
    }
</script>
</body>
</html>
