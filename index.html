<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامية بيوتي - بطاقة الولاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fcf1f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .logo { width: 120px; margin-bottom: 15px; }
        .btn-submit { background-color: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #cardSection { display: none; margin-top: 20px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
    </style>
</head>
<body onload="initApp()">
<div class="container">
    <img src="https://via.placeholder.com/120?text=Samia+Beauty" alt="Logo" class="logo" id="salonLogo">
    <h2 id="titleHeader">نادي ولاء سامية بيوتي</h2>
    <div id="registerForm">
        <input type="text" id="custName" placeholder="الاسم" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="tel" id="custPhone" placeholder="رقم الجوال" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <button class="btn-submit" onclick="processRegistration()">تفعيل البطاقة</button>
    </div>
    <div id="cardSection">
        <div style="font-size:32px; color:#d4af37; font-weight:bold;" id="displayPoints">0 نقطة</div>
        <div id="qrcode"></div>
        <button class="btn-submit" style="background:#000" onclick="alert('اضغطي مشاركة ثم إضافة للشاشة الرئيسية')">إضافة للشاشة الرئيسية</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", // مفتاحك
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const messaging = firebase.messaging();

    function initApp() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('firebase-messaging-sw.js')
            .then(reg => console.log('SW Registered')).catch(err => console.log('SW Error', err));
        }
    }

    async function processRegistration() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        if(!name || !phone) return alert("يرجى ملء البيانات");

        const query = await db.collection("customers").where("phone", "==", phone).get();
        let docId;
        if(!query.empty) {
            docId = query.docs[0].id;
            renderCard(docId, query.docs[0].data());
        } else {
            const res = await db.collection("customers").add({
                name, phone, points: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            docId = res.id;
            renderCard(docId, { name, phone, points: 0 });
        }
        askPermission(docId);
    }

    function renderCard(docId, data) {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('cardSection').style.display = 'block';
        new QRCode(document.getElementById("qrcode"), { text: data.phone, width: 150, height: 150 });
        db.collection("customers").doc(docId).onSnapshot(doc => {
            document.getElementById('displayPoints').innerText = doc.data().points + " نقطة";
        });
    }

    function askPermission(docId) {
        Notification.requestPermission().then(async (permission) => {
            if (permission === 'granted') {
                // استخدام مفتاح VAPID الذي أرسلته
                const token = await messaging.getToken({ vapidKey: 'BA-hdtd_zsaR2lPhSZWKpuolJhGVl4q5rRkMuAi7h4gd4ol1Yu_x6nAl1K5Hjtr3y_yGIvHmka6dsQ4H8uFsulo' });
                if (token) {
                    await db.collection("customers").doc(docId).update({ fcmToken: token });
                    console.log("Token saved!");
                }
            }
        });
    }
</script>
</body>
</html>
