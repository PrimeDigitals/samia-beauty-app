<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامية بيوتي - بطاقة الولاء</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fcf1f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        
        /* تنسيق الشعار */
        .logo { width: 120px; max-height: 120px; margin-bottom: 15px; object-fit: contain; }
        
        h2 { color: #5a3e4a; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 15px; }
        .points-info { background-color: #fdf5e6; color: #d4af37; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 20px; border: 1px dashed #d4af37; }
        .input-group { margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background-color: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        
        /* تصميم الأقسام القابلة للطي (معلومات وشروط) */
        details { text-align: right; margin-top: 15px; background: #f9f9f9; border-radius: 8px; padding: 10px; border: 1px solid #eee; }
        summary { cursor: pointer; font-weight: bold; color: #5a3e4a; outline: none; }
        .details-content { font-size: 13px; color: #666; margin-top: 10px; line-height: 1.6; white-space: pre-line; }
        
        /* أيقونات التواصل الاجتماعي */
        .social-icons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .social-icons a { color: #5a3e4a; font-size: 24px; text-decoration: none; transition: 0.3s; }
        .social-icons a:hover { color: #d4af37; }
        .contact-phone { margin-top: 15px; font-size: 14px; color: #5a3e4a; font-weight: bold; direction: ltr; }

        /* ===== تعديل: زر إضافة للشاشة بدل أزرار المحفظة ===== */
        .wallet-buttons { display: none; margin-top: 20px; gap: 10px; flex-direction: column; }
        .btn-wallet { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; transition: 0.3s; }
        .btn-install { background-color: #5a3e4a; }
        .btn-install:hover { background-color: #4a2e3a; }
        .btn-install:disabled { background-color: #aaa; cursor: default; }
        .install-note { font-size: 12px; color: #999; margin: 0; }
        /* ===================================================== */

        .welcome-back { color: #28a745; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body onload="loadPageSettings()">

<div class="container">
    <img src="https://via.placeholder.com/120?text=Samia+Beauty" alt="Logo" class="logo" id="salonLogo">
    
    <h2>انضمي لبرنامج المكافآت</h2>
    
    <div class="points-info" id="pointsDisplay">
        كل 1 نقطة = 1 ريال تستخدمينها في خدمات سامية بيوتي
    </div>

    <div id="welcomeBackMsg" class="welcome-back">أهلاً برجوعك مرة تانية، بطاقتك جاهزة من قبل بالفعل!</div>

    <div id="registerForm">
        <div class="input-group">
            <input type="text" id="customerName" placeholder="الاسم الأول والأخير" required>
        </div>
        <div class="input-group">
            <input type="tel" id="customerPhone" placeholder="رقم الجوال (مثال: 05xxxxxxxxx)" required>
        </div>
        <button class="btn-submit" onclick="registerCustomer()">إصدار بطاقة الولاء</button>
    </div>

    <!-- تعديل: بدل أزرار Apple/Google Wallet → زر إضافة للشاشة الرئيسية -->
    <div class="wallet-buttons" id="walletSection">
        <p>أضيفي التطبيق على شاشتك لتلقي الإشعارات وتحديث النقاط:</p>
        <button class="btn-wallet btn-install" id="btnInstall" onclick="installPWA()">
            <i class="fa-solid fa-mobile-screen-button"></i>
            إضافة للشاشة الرئيسية
        </button>
        <p class="install-note" id="installNote"></p>
    </div>

    <details>
        <summary>معلومات البطاقة</summary>
        <div class="details-content" id="cardInfoDisplay">يتم تحميل المعلومات...</div>
    </details>
    <details>
        <summary>شروط الاستخدام</summary>
        <div class="details-content" id="termsDisplay">يتم تحميل الشروط...</div>
    </details>

    <div class="social-icons">
        <a href="#" id="linkWhatsapp" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" id="linkInsta" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" id="linkTiktok" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" id="linkSnap" target="_blank"><i class="fa-brands fa-snapchat"></i></a>
        <a href="#" id="linkWeb" target="_blank"><i class="fa-solid fa-globe"></i></a>
    </div>
    <div class="contact-phone" id="phoneDisplay">0500000000</div>
</div>

<!-- ==================== Firebase SDKs ==================== -->
<script type="module">
    import { initializeApp }                                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc }                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getMessaging, getToken, onMessage }                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

    // ============================================================
    // ضع هنا بيانات مشروعك من:
    // Firebase Console → Project Settings → Your Apps → SDK setup
    // ============================================================
    const firebaseConfig = {
        apiKey:            "YOUR_API_KEY",
        authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
        projectId:         "YOUR_PROJECT_ID",
        storageBucket:     "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId:             "YOUR_APP_ID"
    };
    // VAPID Key: Firebase Console → Project Settings → Cloud Messaging → Web Push certificates
    const VAPID_KEY = "YOUR_VAPID_KEY";
    // ============================================================

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // نشارك db والدوال مع بقية الكود
    window._db            = db;
    window._firestore     = { doc, getDoc, setDoc };
    window._firebaseReady = true;

    // إعداد الإشعارات
    try {
        const messaging = getMessaging(app);
        window._messaging = messaging;
        window._getToken  = getToken;
        window._VAPID_KEY = VAPID_KEY;

        // إشعار يصل والمتصفح مفتوح
        onMessage(messaging, (payload) => {
            if (Notification.permission === 'granted') {
                new Notification(payload.notification?.title || 'سامية بيوتي', {
                    body: payload.notification?.body,
                    icon: '/icon-192.png',
                    dir: 'rtl'
                });
            }
        });
    } catch(e) {
        console.warn("Firebase Messaging not available:", e.message);
    }
</script>
<!-- ======================================================= -->

<script>
    // تسجيل Service Worker للإشعارات في الخلفية
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then(() => console.log("SW registered ✅"))
            .catch(e => console.warn("SW error:", e));
    }

    // متغير PWA
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    async function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            if (outcome === 'accepted') {
                document.getElementById('btnInstall').innerText = '✅ تم التثبيت!';
                document.getElementById('btnInstall').disabled = true;
            }
        } else {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            document.getElementById('installNote').innerText = isIOS
                ? '🍎 على iPhone: اضغطي زر المشاركة ثم "Add to Home Screen"'
                : 'التطبيق مثبّت بالفعل أو سيظهر الزر قريباً.';
        }
    }

    // ============================================================
    // الكود الأصلي بالكامل — لم يُمس منه شيء
    // ============================================================

    // تحميل الإعدادات من لوحة التحكم لعرضها للعميلة
    function loadPageSettings() {
        const apply = (settings) => {
            // تحديث الشعار إذا تم إدخال رابط في لوحة التحكم
            if(settings.logoUrl) {
                document.getElementById('salonLogo').src = settings.logoUrl;
            }
            if(settings.pointValue) document.getElementById('pointsDisplay').innerText = `كل 1 نقطة = ${settings.pointValue} ريال تستخدمينها في خدماتنا`;
            if(settings.cardInfo) document.getElementById('cardInfoDisplay').innerText = settings.cardInfo;
            if(settings.terms) document.getElementById('termsDisplay').innerText = settings.terms;
            if(settings.contactPhone) document.getElementById('phoneDisplay').innerText = settings.contactPhone;
            // تحديث الروابط، وإخفاء الأيقونة إذا كان الرابط فارغاً
            updateLink('linkWhatsapp', settings.whatsapp);
            updateLink('linkInsta', settings.insta);
            updateLink('linkTiktok', settings.tiktok);
            updateLink('linkSnap', settings.snap);
            updateLink('linkWeb', settings.website);
        };

        // Firebase أولاً، localStorage كـ fallback
        const fromStorage = () => apply(JSON.parse(localStorage.getItem('samia_settings') || '{}'));
        setTimeout(() => {
            if (window._firebaseReady && window._db) {
                const { doc, getDoc } = window._firestore;
                getDoc(doc(window._db, 'settings', 'main'))
                    .then(snap => apply(snap.exists() ? snap.data() : {}))
                    .catch(fromStorage);
            } else {
                fromStorage();
            }
        }, 600);
    }

    function updateLink(elementId, url) {
        let el = document.getElementById(elementId);
        if(url) { 
            el.href = url; 
            el.style.display = 'inline-block'; 
        } else { 
            el.style.display = 'none'; 
        }
    }

    async function registerCustomer() {
        const name  = document.getElementById('customerName').value;
        const phone = document.getElementById('customerPhone').value;
        
        if(!name || !phone) { 
            alert("يرجى إدخال البيانات كاملة"); 
            return; 
        }

        if (window._firebaseReady && window._db) {
            // ===== Firebase =====
            const { doc, getDoc, setDoc } = window._firestore;
            const ref  = doc(window._db, 'customers', phone);
            const snap = await getDoc(ref);

            if(snap.exists()) {
                // العميلة مسجلة مسبقاً
                document.getElementById('welcomeBackMsg').style.display = 'block';
            } else {
                // عميلة جديدة
                let newId = 'SB-' + Math.floor(Math.random() * 10000);
                await setDoc(ref, { id: newId, name: name, phone: phone, points: 0, history: [], createdAt: new Date().toISOString() });
            }

            // حفظ FCM token لإرسال إشعارات لهذه العميلة لاحقاً
            await saveFCMToken(phone);

        } else {
            // ===== Fallback: الكود الأصلي بالضبط =====
            let customers = JSON.parse(localStorage.getItem('samia_customers')) || [];
            let existing  = customers.find(c => c.phone === phone);
            
            if(existing) {
                // العميلة مسجلة مسبقاً
                document.getElementById('welcomeBackMsg').style.display = 'block';
            } else {
                // عميلة جديدة
                let newId = 'SB-' + Math.floor(Math.random() * 10000);
                customers.push({ id: newId, name: name, phone: phone, points: 0 });
                localStorage.setItem('samia_customers', JSON.stringify(customers));
            }
        }

        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('walletSection').style.display = 'flex';

        // توجيه iOS
        if (!deferredPrompt) {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isIOS) {
                document.getElementById('installNote').innerText = '🍎 على iPhone: اضغطي زر المشاركة ثم "Add to Home Screen"';
                document.getElementById('btnInstall').disabled = true;
            }
        }
    }

    async function saveFCMToken(phone) {
        if (!window._messaging || !window._getToken || !window._VAPID_KEY) return;
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await window._getToken(window._messaging, { vapidKey: window._VAPID_KEY });
                if (token) {
                    const { doc, setDoc } = window._firestore;
                    await setDoc(doc(window._db, 'customers', phone), { fcmToken: token }, { merge: true });
                }
            }
        } catch(e) {
            console.warn("FCM token error:", e.message);
        }
    }
</script>
</body>
</html>
