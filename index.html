<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامية بيوتي - بطاقة الولاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* التنسيقات الأصلية */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fcf1f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .logo { width: 120px; max-height: 120px; margin-bottom: 15px; object-fit: contain; }
        h2 { color: #5a3e4a; margin-bottom: 5px; }
        .points-info { background-color: #fdf5e6; color: #d4af37; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 20px; border: 1px dashed #d4af37; }
        .input-group { margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background-color: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        details { text-align: right; margin-top: 15px; background: #f9f9f9; border-radius: 8px; padding: 10px; border: 1px solid #eee; }
        summary { cursor: pointer; font-weight: bold; color: #5a3e4a; outline: none; }
        .details-content { font-size: 13px; color: #666; margin-top: 10px; line-height: 1.6; white-space: pre-line; }
        .social-icons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .social-icons a { color: #5a3e4a; font-size: 24px; text-decoration: none; transition: 0.3s; }
        .social-icons a:hover { color: #d4af37; }
        .contact-phone { margin-top: 15px; font-size: 14px; color: #5a3e4a; font-weight: bold; direction: ltr; }
        /* التنسيقات الجديدة للـ QR والمحفظة */
        .wallet-buttons { display: none; margin-top: 20px; gap: 10px; flex-direction: column; }
        .btn-wallet { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .apple-wallet { background-color: #000; }
        .google-wallet { background-color: #4285F4; }
        #qrcode { display: flex; justify-content: center; margin-top: 20px; padding: 10px; background: white; border-radius: 10px; }
        .welcome-back { color: #28a745; font-weight: bold; margin-bottom: 15px; display: none; }
        .points-display-large { font-size: 24px; color: #5a3e4a; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <img src="https://via.placeholder.com/120?text=Samia+Beauty" alt="Logo" class="logo" id="salonLogo">
    <h2 id="welcomeTitle">انضمي لبرنامج المكافآت</h2>
    <div class="points-info" id="pointsInfoText">جاري تحميل الإعدادات...</div>
    
    <div id="welcomeBackMsg" class="welcome-back">أهلاً برجوعك! بطاقتك محدثة وجاهزة.</div>

    <div id="registerForm">
        <div class="input-group"><input type="text" id="customerName" placeholder="الاسم الكريم" required></div>
        <div class="input-group"><input type="tel" id="customerPhone" placeholder="رقم الجوال (05xxxxxxxx)" required></div>
        <button class="btn-submit" onclick="registerCustomer()">إصدار بطاقتي الرقمية</button>
    </div>

    <div id="cardSection" style="display:none;">
        <div class="points-display-large" id="currentPoints">0 نقطة</div>
        <div id="qrcode"></div>
        <p style="font-size: 12px; margin-top: 10px;">أظهري هذا الكود للموظفة عند الدفع</p>
        
        <div class="wallet-buttons" style="display:flex;">
            <button class="btn-wallet apple-wallet" onclick="saveToHome('apple')">
                <i class="fa-brands fa-apple"></i> حفظ في Apple Wallet (مجاني)
            </button>
            <button class="btn-wallet google-wallet" onclick="saveToHome('google')">
                <i class="fa-brands fa-google"></i> حفظ في Google Wallet (مجاني)
            </button>
        </div>
    </div>

    <details><summary>معلومات البطاقة</summary><div class="details-content" id="cardInfoDisplay"></div></details>
    <details><summary>شروط الاستخدام</summary><div class="details-content" id="termsDisplay"></div></details>

    <div class="social-icons">
        <a href="#" id="linkWhatsapp" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" id="linkInsta" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" id="linkTiktok" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" id="linkSnap" target="_blank"><i class="fa-brands fa-snapchat"></i></a>
        <a href="#" id="linkWeb" target="_blank"><i class="fa-solid fa-globe"></i></a>
    </div>
    <div class="contact-phone" id="phoneDisplay"></div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSy...", // ضع مفتاحك هنا
        authDomain: "primedigitals-1802f.firebaseapp.com",
        projectId: "primedigitals-1802f",
        storageBucket: "primedigitals-1802f.appspot.com",
        messagingSenderId: "774910246237",
        appId: "1:774910246237:web:866236b8a8b13d28913210"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function initApp() {
        loadSettings();
    }

    async function loadSettings() {
        const doc = await db.collection("settings").doc("main").get();
        if (doc.exists) {
            const s = doc.data();
            if(s.logoUrl) document.getElementById('salonLogo').src = s.logoUrl;
            document.getElementById('pointsInfoText').innerText = s.pointNote || `كل 1 نقطة = ${s.pointValue || 1} ريال`;
            document.getElementById('cardInfoDisplay').innerText = s.cardInfo || '';
            document.getElementById('termsDisplay').innerText = s.terms || '';
            document.getElementById('phoneDisplay').innerText = s.contactPhone || '';
            // تحديث الروابط
            ['Whatsapp', 'Insta', 'Tiktok', 'Snap', 'Web'].forEach(key => {
                let val = s[key.toLowerCase()];
                let el = document.getElementById('link'+key);
                if(val) { el.href = val; el.style.display = 'inline-block'; } else { el.style.display = 'none'; }
            });
        }
    }

    async function registerCustomer() {
        const name = document.getElementById('customerName').value;
        const phone = document.getElementById('customerPhone').value;
        if(!name || !phone) { alert("يرجى ملء البيانات"); return; }

        const snap = await db.collection("customers").where("phone", "==", phone).get();
        
        if(!snap.empty) {
            const userData = snap.docs[0].data();
            showCard(userData, snap.docs[0].id);
            document.getElementById('welcomeBackMsg').style.display = 'block';
        } else {
            const newDoc = await db.collection("customers").add({
                name, phone, points: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            const newUser = (await newDoc.get()).data();
            showCard(newUser, newDoc.id);
        }
    }

    function showCard(data, id) {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('welcomeTitle').innerText = "بطاقتك الرقمية";
        document.getElementById('cardSection').style.display = 'block';
        document.getElementById('currentPoints').innerText = `${data.points} نقطة`;
        
        // توليد QR Code مجاني
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), {
            text: phone,
            width: 150,
            height: 150
        });

        // مراقبة النقاط لحظياً (Real-time)
        db.collection("customers").doc(id).onSnapshot(doc => {
            if(doc.exists) document.getElementById('currentPoints').innerText = `${doc.data().points} نقطة`;
        });
    }

    function saveToHome(type) {
        let msg = type === 'apple' ? 
            "لحفظ البطاقة مجاناً في آيفون:\n1. اضغطي زر 'المشاركة' (المربع وسهم لأعلى).\n2. اختاري 'إضافة للشاشة الرئيسية'.\nستظهر البطاقة كتطبيق في جوالك!" :
            "لحفظ البطاقة مجاناً في أندرويد:\n1. اضغطي على الـ 3 نقاط بالأعلى.\n2. اختاري 'تثبيت التطبيق' أو 'إضافة للشاشة الرئيسية'.";
        alert(msg);
    }
</script>
</body>
</html>
